####################################################
## Eink Photo Frame - Seeed reTerminal E1002
##
## Two LVGL pages, each bound to a single online_image whose URL is rewritten
## at runtime (via online_image.set_url) to select a "source" by index:
##
##   Photo page:      GET /photo.png?index=N     -> photo-frame-bridge picks
##                     sources[N % len(sources)] server-side. Source list is
##                     ["photoprism"] + every subfolder of the bridge's
##                     adhoc_images mount, discovered fresh on every request -
##                     drop a new folder on the NAS and it's a source, no
##                     firmware change needed.
##   Dashboard page:   GET /dashboard.png?index=N -> same idea, but the
##                     source list ("weather", "stats", ...) is fixed in the
##                     bridge's code, since each dashboard type needs its own
##                     fetch/render logic (unlike photo folders, which are
##                     pure data).
##
## The device never needs to know how many sources exist in either category:
## it just increments its own counter on every button press and lets the
## bridge do `index % current_count` - so the bridge can grow either list
## over time without ever touching this file.
##
## Buttons (confirmed physical layout on this unit):
##   Green (center, GPIO3):  refresh whatever's currently showing (new random
##                           photo if on the photo page, fresh data if on the
##                           dashboard page) - same source, no cycling.
##   White (left,  GPIO5):   cycle to the next photo source
##   White (right, GPIO4):   cycle to the next dashboard source
## (Other units/hardware revisions have been seen with this reversed - if
## yours doesn't match, swap the GPIO4/GPIO5 pin numbers below.)
##
## Based on the "Seeed reTerminal Art Display" config by Guy Sie
## (https://github.com/GuySie/random-things), which itself builds on work by
## Paul Krischer (https://github.com/SqyD) using the epaper_spi component +
## LVGL, including the online_image.set_url pattern used here for dynamic
## URLs. Simplified/adapted for this project: no numbered-file browsing, no
## deep sleep (device is USB powered).
####################################################

substitutions:
  bridge_url: "http://192.168.68.61:8090"

esphome:
  name: eink-photo-frame
  friendly_name: Eink Photo Frame
  min_version: 2025.11.1
  on_boot:
    - priority: -100
      then:
        # Extra time for the display to finish initializing (needed since ESPHome 2025.11)
        - delay: 5000ms
        - globals.set:
            id: refresh_busy
            value: "true"
        - globals.set:
            id: refresh_started_at
            value: !lambda "return millis();"
        - component.update: photo_image
        # Battery voltage divider - left enabled continuously (see the sensor:
        # block below) rather than toggled per-reading, to keep this simple.
        - output.turn_on: battery_enable

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    # Hypothesis, not confirmed (no crash backtrace could be captured - the
    # device's USB-serial link wasn't passing any data despite the network
    # logger working fine, so panic output was unobservable). Logs consistently
    # show "a scheduled task took a long time for an operation" warnings
    # (615ms-2.6s) right as each download starts, clustering exactly where
    # intermittent silent failures/reboots were observed. ESP-IDF's default
    # 5s task watchdog could plausibly trip if one of these stalls happens to
    # stack with other slow work (LVGL redraw, epaper_spi's per-loop
    # processing) in the same window. Raising it is a low-risk mitigation to
    # test, not a verified fix.
    sdkconfig_options:
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "15"

psram:
  mode: octal
  speed: 80MHz

# The reTerminal E series uses a CH340K USB-serial bridge wired specifically to
# UART0 (per Seeed's docs) - without this explicit setting, serial logging got
# zero bytes despite the device being fully healthy (network logging always
# worked). Confirmed fix: this was the actual cause.
#
logger:
  hardware_uart: UART0

api:
  encryption:
    key: !secret eink_photo_frame_api_key

ota:
  - platform: esphome
    password: !secret eink_photo_frame_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Light-touch power saving: lets the radio doze between beacon intervals
  # instead of staying fully awake at all times. This device is on-demand only
  # (buttons, no polling), so the odd extra tens-of-ms of WiFi latency on a
  # button press is not noticeable against the ~31.5s panel refresh anyway.
  # Deliberately not going further (deep sleep) for now - that would add
  # real, noticeable latency per button press (wake + reconnect before
  # anything happens), which is a bigger UX trade-off than this project
  # wanted to take on right now.
  power_save_mode: light

  # Fallback hotspot (captive portal) if WiFi connection fails
  ap:
    ssid: "Eink-Photo-Frame Fallback"
    password: !secret eink_photo_frame_ap_password

# SNTP over the WiFi connection above - the ESP32 has no RTC/battery-backed
# clock of its own, so wall-clock time only exists once this has synced at
# least once after boot. Used to show a "as of <date/time>" line on the
# dashboard page - see the device_time_label update inside refresh_display
# below, and the label widget itself further down in lvgl:.
time:
  - platform: sntp
    id: esp_time
    timezone: America/Los_Angeles

captive_portal:

http_request:

spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9

# Onboard SHT4x temperature/humidity sensor (Seeed's documented pinout for this
# board).
i2c:
  sda: GPIO19
  scl: GPIO20

# Battery voltage divider needs GPIO21 driven high to read anything meaningful
# on GPIO1 - left on continuously rather than toggled per-reading, to keep this
# simple (see the wifi power_save_mode comment above for why this project is
# taking a light-touch approach to power for now).
output:
  - platform: gpio
    pin: GPIO21
    id: battery_enable

sensor:
  - platform: sht4x
    update_interval: 60s
    temperature:
      name: "Temperature"
      id: device_temperature
      on_value: [{script.execute: update_device_status_label}]
    humidity:
      name: "Humidity"
      id: device_humidity
      on_value: [{script.execute: update_device_status_label}]
  - platform: adc
    pin: GPIO1
    id: battery_voltage
    name: "Battery Voltage"
    update_interval: 60s
    attenuation: 12db
    # Seeed's own reference config for this board: the ADC pin sees half the
    # actual battery voltage through an onboard divider.
    filters:
      - multiply: 2.0
    on_value: [{script.execute: update_device_status_label}]

# These readings only exist on the device, so - deliberately, per a decision to
# not have this device call out to anywhere but the bridge it already talks to
# - they're blended directly onto the dashboard page here via LVGL (see the
# update_device_status_label script below, in the script: block further down,
# and the dashboard_page's label widget), instead of being reported/pushed
# anywhere or pulled by the bridge. Whatever the label currently says is baked
# into the panel the next time any refresh happens (buttons only, same as
# everything else in this project) - there's no separate refresh path for this.

# A full refresh of this 6-color panel normally takes ~31.5-32s very
# consistently (many measurements clustered tightly in that range). epaper_spi's
# update() is non-blocking and simply REJECTS (logs an ERROR, does nothing) if
# called again while a refresh is still in flight - there's no built-in
# queueing. Every trigger that pushes to the physical panel goes through this
# script instead of calling component.update directly, so overlapping requests
# are serialized: mode 'single' means a refresh request that arrives while one
# is already running is just dropped.
#
# Investigated a suspected "stuck forever" hang here (panel waiting on its BUSY
# pin during power-off with no logged progress) by enabling VERBOSE logging.
# Turned out to be a false alarm *for the cases actually captured* - both
# eventually completed with "Display update took" - but the logging itself
# reported ~48s where visual observation of the real panel (unaffected by
# logging overhead) confirms it never actually takes more than ~35s - the
# instrumentation was inflating its own measurement. Widened this script's
# hold window from 35s to 40s: a small, real margin above the ~31.5-32s normal
# case and the ~35s eyeballed worst case, without chasing the inflated 48s
# figure.
#
# refresh_busy (below) is cleared here, at the very end - see its comment for why
# gating on this script's own is_running isn't enough on its own.
script:
  # Recomputes the dashboard page's top-right sensor-readout label from the
  # device's own temperature/humidity/battery sensors. Triggered by each
  # sensor's on_value (see sensor: above) - purely an LVGL-buffer update, does
  # not touch the physical panel; whatever it last set is what's baked in the
  # next time a real refresh happens.
  - id: update_device_status_label
    then:
      - lvgl.label.update:
          id: device_status_label
          text: !lambda |-
            // 3.0V empty, 4.2V full - rough single-cell LiPo curve, good enough
            // for a glance, not a fuel gauge.
            float pct = (id(battery_voltage).state - 3.0f) / (4.2f - 3.0f) * 100.0f;
            pct = std::max(0.0f, std::min(100.0f, pct));
            char buf[48];
            snprintf(buf, sizeof(buf), "Batt %.0f%%  %.1fC  %.0f%% RH", pct, id(device_temperature).state,
                     id(device_humidity).state);
            return std::string(buf);
  - id: refresh_display
    mode: single
    then:
      # Refreshed here (right before the actual panel push) rather than on a
      # timer like update_device_status_label above - date/time changes
      # continuously, so the freshest possible value is whatever it is at the
      # instant a real refresh is actually about to happen, not up to 60s
      # stale from the last sensor update. Guarded on is_valid() since the
      # ESP32 has no RTC of its own - time doesn't exist at all until SNTP has
      # synced at least once after boot (normally within a few seconds, but
      # not instant, and never if WiFi/NTP is somehow unreachable).
      - lvgl.label.update:
          id: device_time_label
          text: !lambda |-
            if (!id(esp_time).now().is_valid()) {
              return std::string("");
            }
            return id(esp_time).now().strftime("%a %b %d  %I:%M %p");
      # Root cause of the "phantom" silent-no-refresh bug (confirmed via VERBOSE
      # epaper_spi logs: UPDATE state entered then immediately exited straight to
      # IDLE, ~20ms later, with the panel untouched): epaper_spi's do_update_()
      # is a no-op for LVGL-driven displays like this one (esphome's lvgl
      # component never registers a Display page_/writer_ - see
      # esphome/components/display/display.cpp's do_update_()). The ONLY thing
      # that ever actually draws pixels (and thus populates the x_low_/x_high_
      # dirty-rect bounds epaper_spi's UPDATE state checks) is LVGL's OWN
      # independent lv_timer_handler(), called from LvglComponent::loop() - a
      # separate component, on its own schedule. Because `display:` is declared
      # before `lvgl:` in this file, epaper_spi's loop tends to run BEFORE
      # LvglComponent's on the very next tick after lvgl.image.update just
      # invalidated the new image - so epaper_spi's UPDATE-state check can catch
      # the bounds still empty (LVGL hasn't flushed yet) and silently short-
      # circuit back to IDLE, with no log line and no error - exactly the
      # observed symptom. This delay gives LVGL's own loop a guaranteed window
      # to actually flush the new content into the buffer first. 100ms is a
      # large safety margin over one scheduler pass (main-loop iterations here
      # are sub-10ms normally); trivial next to the ~31.5s refresh itself.
      - delay: 100ms
      - component.update: epaper_display
      # Hold the "busy" window open for the real hardware refresh duration, since
      # component.update() itself returns immediately and doesn't block.
      - delay: 40s
      - globals.set:
          id: refresh_busy
          value: "false"

# Safety net for a *genuinely* stuck refresh (as opposed to just a slow one,
# which the 40s window above already covers): if refresh_busy has been true for
# far longer than any legitimate cycle could take, something is actually wrong
# (e.g. the panel's BUSY pin truly never clearing) and the only known recovery
# is a full reset - the epaper_spi driver has no internal timeout of its own.
# 3 minutes is roughly 5x the eyeballed worst case, so this should never fire
# during normal operation, only on a real hang.
interval:
  - interval: 30s
    then:
      - if:
          condition:
            lambda: "return id(refresh_busy) && (millis() - id(refresh_started_at) > 180000);"
          then:
            - logger.log: "Refresh stuck for over 3 minutes - rebooting to recover"
            - delay: 500ms
            - lambda: "App.safe_reboot();"

globals:
  # True from the moment a button's fetch is *accepted* until the whole cycle
  # (download -> decode -> display push -> 35s hardware-refresh hold) finishes.
  # Gating buttons on this - not on `script.is_running: refresh_display` - matters
  # because online_image's own "already updating" guard only becomes active once
  # it starts decoding, not during the initial HTTP-connect phase (observed to
  # take up to ~2.5s). A second button press landing in that earlier window slips
  # past both online_image's guard and a refresh_display-only check, silently
  # overwriting the in-flight download's HTTP container - the first request gets
  # abandoned and the second one wins (confirmed: observed the device show the
  # 2nd source with the 1st request's result discarded). A device reboot was also
  # seen after a lot of repeated button-mashing during testing; a resource leak
  # from this exact race is a plausible cause (the abandoned container's .end()
  # never gets called) but that connection is unconfirmed - no crash backtrace was
  # captured. This flag closes the race either way, by blocking button presses
  # from the instant one is accepted, not from whenever the download happens to
  # reach the decoding stage.
  - id: refresh_busy
    type: bool
    initial_value: "false"
  # millis() timestamp of when refresh_busy last became true - used only by the
  # stuck-refresh watchdog (see the interval: block above) to detect a
  # genuinely hung cycle, not a normal one.
  - id: refresh_started_at
    type: uint32_t
    initial_value: '0'
  # Which page is currently active: 0 = photo, 1 = dashboard. Drives what the
  # green button's "refresh" means.
  - id: current_mode
    type: int
    initial_value: '0'
  # Monotonically increasing counters, one per category. Never reset/wrapped
  # on-device - the bridge does `index % current_source_count` server-side, so
  # these just need to keep changing on each press, not track an exact source.
  - id: photo_index
    type: int
    initial_value: '0'
  - id: dashboard_index
    type: int
    initial_value: '0'

binary_sensor:
  # Green button: refresh whatever's currently showing, using its own source's
  # rules (new random photo for the photo page, fresh data for the dashboard
  # page) - never changes source/page.
  - platform: gpio
    pin:
      number: GPIO3
      mode: INPUT_PULLUP
      inverted: true
    id: button_green
    name: "Refresh"
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_press:
      then:
        - if:
            condition:
              lambda: "return id(refresh_busy);"
            then:
              - logger.log: "Green button pressed - ignored, a refresh is already in progress"
            else:
              - globals.set:
                  id: refresh_busy
                  value: "true"
              - globals.set:
                  id: refresh_started_at
                  value: !lambda "return millis();"
              - if:
                  condition:
                    lambda: "return id(current_mode) == 0;"
                  then:
                    - logger.log: "Green button pressed - fetching a new photo from the current source"
                    - component.update: photo_image
                  else:
                    - logger.log: "Green button pressed - refreshing the current dashboard source"
                    - component.update: dashboard_image

  # White button (right): cycle to the next dashboard source
  - platform: gpio
    pin:
      number: GPIO4
      mode: INPUT_PULLUP
      inverted: true
    id: button_white_1
    name: "Next Dashboard Source"
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_press:
      then:
        - if:
            condition:
              lambda: "return id(refresh_busy);"
            then:
              - logger.log: "Dashboard button pressed - ignored, a refresh is already in progress"
            else:
              - globals.set:
                  id: refresh_busy
                  value: "true"
              - globals.set:
                  id: refresh_started_at
                  value: !lambda "return millis();"
              - globals.set:
                  id: current_mode
                  value: "1"
              - globals.set:
                  id: dashboard_index
                  value: !lambda "return id(dashboard_index) + 1;"
              - logger.log:
                  format: "Dashboard button pressed - cycling to index %d"
                  args: [id(dashboard_index)]
              # online_image.set_url triggers its own download automatically - a
              # trailing component.update here would race it and get rejected with
              # "Image already being updated", which was observed to corrupt the
              # completion callback chain (download succeeds but on_download_finished
              # never fires, so nothing ever reaches the display). Don't add one back.
              - online_image.set_url:
                  id: dashboard_image
                  url: !lambda |-
                    return "${bridge_url}/dashboard.png?index=" + std::to_string(id(dashboard_index));

  # White button (left): cycle to the next photo source
  - platform: gpio
    pin:
      number: GPIO5
      mode: INPUT_PULLUP
      inverted: true
    id: button_white_2
    name: "Next Photo Source"
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_press:
      then:
        - if:
            condition:
              lambda: "return id(refresh_busy);"
            then:
              - logger.log: "Photo button pressed - ignored, a refresh is already in progress"
            else:
              - globals.set:
                  id: refresh_busy
                  value: "true"
              - globals.set:
                  id: refresh_started_at
                  value: !lambda "return millis();"
              - globals.set:
                  id: current_mode
                  value: "0"
              - globals.set:
                  id: photo_index
                  value: !lambda "return id(photo_index) + 1;"
              - logger.log:
                  format: "Photo button pressed - cycling to index %d"
                  args: [id(photo_index)]
              # See the comment on the dashboard button above - set_url already
              # triggers its own download, an extra component.update here would race it.
              - online_image.set_url:
                  id: photo_image
                  url: !lambda |-
                    return "${bridge_url}/photo.png?index=" + std::to_string(id(photo_index));

display:
  - platform: epaper_spi
    id: epaper_display
    model: Seeed-reTerminal-E1002
    update_interval: never
    auto_clear_enabled: false

lvgl:
  buffer_size: 12%
  pages:
    - id: photo_page
      widgets:
        - image:
            align: CENTER
            id: photo_art
            src: photo_image
    - id: dashboard_page
      widgets:
        - image:
            align: CENTER
            id: dashboard_art
            src: dashboard_image
        # Device's own battery/temperature/humidity, blended over the top-right
        # corner of whatever dashboard image is showing (see the sensor: block
        # and update_device_status_label script above). Declared after the
        # image widget so it draws on top of it, not behind.
        - label:
            id: device_status_label
            align: TOP_RIGHT
            x: -20
            y: 20
            text: ""
            text_color: 0x000000
        # Date/time this refresh actually happened - see refresh_display above
        # for why it's updated there instead of on the sensor timer like the
        # label above it. Empty until the first successful SNTP sync after
        # boot (usually a few seconds, not instant).
        - label:
            id: device_time_label
            align: TOP_RIGHT
            x: -20
            y: 46
            text: ""
            text_color: 0x000000

image:
  # Photo sources: PhotoPrism favorites plus every subfolder of the bridge's
  # adhoc_images mount. Starts on index 0 (PhotoPrism) at boot.
  - platform: online_image
    id: photo_image
    url: "${bridge_url}/photo.png?index=0"
    type: RGB565
    format: PNG
    # No periodic refresh - fully on-demand (green button), same as dashboard_image
    # below. A background timer here was found to race button presses for the
    # physical display (whichever's on_download_finished chain won the last
    # component.update: epaper_display call determined what showed, regardless
    # of what was actually pressed) - simplest fix is no automatic triggers at
    # all. Revisit later if a background slideshow timer is wanted again; it'll
    # need its own refresh_busy gating, not the online_image update_interval.
    update_interval: never
    on_download_finished:
      - lvgl.image.update:
          id: photo_art
          src: photo_image
      - lvgl.page.show: photo_page
      - script.execute: refresh_display
    on_error:
      - logger.log: "Failed to download photo from bridge"
      # Without this, a failed download leaves refresh_busy stuck true forever,
      # since refresh_display (the only other place that clears it) never runs.
      - globals.set:
          id: refresh_busy
          value: "false"

  # Dashboard sources (weather, PhotoPrism stats, ...). Fetched on demand only
  # (see button_white_1 above) - no periodic update_interval, so viewing the
  # photo page never triggers an unrelated dashboard refresh/flash.
  - platform: online_image
    id: dashboard_image
    url: "${bridge_url}/dashboard.png?index=0"
    type: RGB565
    format: PNG
    update_interval: never
    on_download_finished:
      - lvgl.image.update:
          id: dashboard_art
          src: dashboard_image
      - lvgl.page.show: dashboard_page
      - script.execute: refresh_display
    on_error:
      - logger.log: "Failed to download dashboard source from bridge"
      - globals.set:
          id: refresh_busy
          value: "false"
